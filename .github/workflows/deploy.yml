name: Deploy BETA Services

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build JAR
        run: ./gradlew :user-server:bootJar -x test

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push User Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.user
          push: true
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            yeongo05/beta-user:latest
            yeongo05/beta-user:${{ github.sha }}

  deploy-primary:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Blue(active) 무중단 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROXY_HOST }}
          username: ubuntu
          key: ${{ secrets.PROXY_SSH_KEY }}
          script: |
            ssh -i /home/ubuntu/.ssh/beta_user_key \
                -o StrictHostKeyChecking=no \
                ubuntu@10.0.1.240 << 'INNER_EOF'
              set -e

              echo ">>> pull image"
              docker pull yeongo05/beta-user:latest

              echo ">>> green(backup) 새 버전으로 먼저 갱신"
              docker stop beta-user-green || true
              docker rm beta-user-green || true
              docker run -d \
                --name beta-user-green \
                -p 8081:8080 \
                --env-file /home/ubuntu/env/beta-user-backup.env \
                -v /home/ubuntu/oci_api_key.pem:/app/keys/oci_api_key.pem:ro \
                -v /home/ubuntu/keys/firebase-admin.json:/app/keys/firebase-admin.json:ro \
                -v /home/ubuntu/app-cacerts:/app/certs/app-cacerts:ro \
                --restart always \
                --health-cmd="curl -f http://localhost:8080/actuator/health || exit 1" \
                --health-interval=10s \
                --health-timeout=5s \
                --health-retries=6 \
                yeongo05/beta-user:latest

              echo ">>> green health check 대기 (최대 60초)"
              for i in $(seq 1 30); do
                if curl -sf http://localhost:8081/actuator/health > /dev/null 2>&1; then
                  echo ">>> green health OK (${i}s)"
                  break
                fi
                if [ "$i" -eq 30 ]; then
                  echo ">>> green health 실패. 중단."
                  exit 1
                fi
                sleep 2
              done

              echo ">>> blue(active) 새 버전으로 교체 (green이 backup으로 커버)"
              docker stop beta-user-blue || true
              docker rm beta-user-blue || true
              docker run -d \
                --name beta-user-blue \
                -p 8080:8080 \
                --env-file /home/ubuntu/env/beta-user.env \
                -v /home/ubuntu/oci_api_key.pem:/app/keys/oci_api_key.pem:ro \
                -v /home/ubuntu/keys/firebase-admin.json:/app/keys/firebase-admin.json:ro \
                -v /home/ubuntu/app-cacerts:/app/certs/app-cacerts:ro \
                --restart always \
                --health-cmd="curl -f http://localhost:8080/actuator/health || exit 1" \
                --health-interval=10s \
                --health-timeout=5s \
                --health-retries=6 \
                yeongo05/beta-user:latest

              echo ">>> blue health check 대기 (최대 60초)"
              for i in $(seq 1 30); do
                if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
                  echo ">>> blue health OK (${i}s)"
                  break
                fi
                if [ "$i" -eq 30 ]; then
                  echo ">>> blue health 실패"
                  exit 1
                fi
                sleep 2
              done

              echo ">>> dangling 이미지 정리"
              docker image prune -f

              echo ">>> 배포 완료 (blue=active, green=backup)"
            INNER_EOF
