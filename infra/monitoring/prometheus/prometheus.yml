global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'beta-user-server'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:8080']
        labels:
          application: 'beta-user-server'
          environment: 'production'

  - job_name: 'beta-admin-server'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
       - targets: ['<BETA_ADMIN_PRIVATE_IP>:8080']
         labels:
          application: 'beta-admin-server'
          environment: 'production'
